name: Claude Implement Issue - naive-generic

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to implement'
        required: true
      issue_title:
        description: 'Issue title'
        required: true
      issue_body:
        description: 'Issue body / description'
        required: false

jobs:
  claude-implement:
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'naive-generic'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
      actions: read

    steps:
      - name: Checkout experiment branch
        uses: actions/checkout@v4
        with:
          ref: exp/naive-generic
          fetch-depth: 0

      - name: Run Claude Code Action
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          show_full_output: true
          claude_args: "--max-turns 24"
          prompt: |
            You are the autonomous evolution engine for the **naive-generic** experiment.

            Active branch: exp/naive-generic
            Do NOT access, inspect, or reference any other branch (main, baseline/*, exp/naive-team, exp/structured-*, exp/expert-*, or any other sibling experiment branch).
            Any PR you open must target exp/naive-generic, never main.

            The GitHub issue you must implement is:

            Issue #${{ github.event.issue.number || inputs.issue_number }}: ${{ github.event.issue.title || inputs.issue_title }}

            ${{ github.event.issue.body || inputs.issue_body }}

            Your task is not complete until one of these happens:
            1. A pull request is created or updated with the implementation (targeting exp/naive-generic)
            2. You encounter a hard blocking error and explain it clearly

            Instructions:
            - Inspect the repository (current branch only)
            - Create a dedicated sub-branch off exp/naive-generic for the task
            - Implement the requested change
            - Run tests if available; if tests do not exist, create appropriate ones
            - Commit the changes
            - Open or update a pull request targeting exp/naive-generic

            Constraints:
            - Never push directly to exp/naive-generic or main
            - Follow CLAUDE.md strictly
            - Keep changes minimal, reviewable, and reproducible
            - Do not modify workflow or governance files unless explicitly required by the issue
            - Never access or reference sibling experiment branches
